<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI-powered chatbot for BookStack documentation">
  <title>BookStack AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container" id="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
            <path d="M8 7h6"/><path d="M8 11h8"/>
          </svg>
          <h1>BookStack AI</h1>
        </div>
      </div>
      <div class="sidebar-section">
        <h3>Available Books</h3>
        <div class="books-list" id="books-list">
          <div class="loading-books">Loading books...</div>
        </div>
      </div>
      <div class="sidebar-footer">
        <div class="connection-status" id="connection-status">
          <span class="status-dot"></span>
          <span>Connected to BookStack</span>
        </div>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-main">
      <header class="chat-header">
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="header-info">
          <h2>Documentation Assistant</h2>
          <span class="header-subtitle">Ask anything about your BookStack docs</span>
        </div>
        <button class="clear-chat" id="clear-chat" title="New conversation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          <span>New Chat</span>
        </button>
      </header>

      <!-- Messages -->
      <div class="messages-container" id="messages-container">
        <div class="welcome-screen" id="welcome-screen">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
              <circle cx="12" cy="10" r="2"/><path d="M12 12v3"/>
            </svg>
          </div>
          <h2>Welcome to BookStack AI</h2>
          <p>I can search your documentation and answer questions. Try asking:</p>
          <div class="suggestion-chips">
            <button class="suggestion-chip" data-query="What documentation do we have?">📚 What docs do we have?</button>
            <button class="suggestion-chip" data-query="Show me the most important pages">⭐ Most important pages</button>
            <button class="suggestion-chip" data-query="How do I get started?">🚀 How do I get started?</button>
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="message-input" placeholder="Ask a question about your documentation..." rows="1" autofocus></textarea>
          <button class="send-button" id="send-button" disabled aria-label="Send message">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/>
            </svg>
          </button>
        </div>
        <span class="input-hint">Press Enter to send · Shift+Enter for new line</span>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
