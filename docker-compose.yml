services:
  bookstack-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookstack-mcp
    env_file:
      - .env
    ports:
      - "${PORT:-8007}:8007"
    restart: unless-stopped

  chatbot:
    build:
      context: ./chatbot
      dockerfile: Dockerfile
    container_name: bookstack-chatbot
    env_file:
      - chatbot/.env
    ports:
      - "3000:3000"
    restart: unless-stopped
