name: Sanity Checks & Auto Merge to Main

on:
  push:
    branches:
      - Develop

jobs:
  verify-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Verify Docker Assets
        run: |
          echo "Ensuring deployment files are intact..."
          test -f Dockerfile || { echo "Dockerfile is missing!"; exit 1; }
          test -f docker-compose.yml || { echo "docker-compose.yml is missing!"; exit 1; }
          echo "Docker configuration found!"
          
      - name: Merge Develop into Main
        run: |
          git config --global user.name "GitHub Auto-Merge Action"
          git config --global user.email "actions@github.com"
          
          # Checkout Main and align it with the remote
          git checkout Main
          git pull origin Main || echo "Main not present on remote"
          
          # Merge Develop securely into Main
          git merge origin/Develop --allow-unrelated-histories
          
          # Push the changes
          git push origin Main
