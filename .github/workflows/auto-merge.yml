name: Sanity Checks & Auto Merge to Main

on:
  push:
    branches:
      - Develop

jobs:
  verify-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Verify Docker Assets
        run: |
          echo "Ensuring deployment files are intact..."
          test -f Dockerfile || { echo "Dockerfile is missing!"; exit 1; }
          test -f docker-compose.yml || { echo "docker-compose.yml is missing!"; exit 1; }
          echo "Docker configuration found!"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Run Unit Tests
        run: |
          echo "Installing test dependencies..."
          cd UnitTest && npm ci
          echo "Running unit tests..."
          npm run test:ci
          echo "All tests passed!"
          
      - name: Merge Develop into main
        run: |
          echo "Pushing Develop branch directly to main..."
          git push origin HEAD:main
